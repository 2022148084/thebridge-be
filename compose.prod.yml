services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data

  # 운영 환경에도 Redis 추가!
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-The Bridge Backend}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER:?FIRST_SUPERUSER is required}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:?FIRST_SUPERUSER_PASSWORD is required}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["https://thebridge.hsh-server.com"]}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}  # OCI 4코어시라면 4로 올리셔도 좋습니다
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_RPM_LIMIT: ${GEMINI_RPM_LIMIT:-500}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0} # Redis URL 추가!
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy # 의존성 추가!
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  app-db-data:
